version: '3.9'
# Cockroach local infrastructure stack.
# Provides Postgres (project data), Redis (broker+cache), and Neo4j (knowledge graph).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cockroach
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j_data:/data]

volumes:
  postgres_data:
  neo4j_data:
